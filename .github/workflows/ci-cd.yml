name: Flask CI/CD

on:
  push:
    branches: [ "main", "staging" ]
  release:
    types: [ "published" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:

  install-and-test:
    name: Install Dependencies & Run Tests
    runs-on: ubuntu-latest
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}
      SECRET_KEY: ${{ secrets.SECRET_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov certifi

      - name: Run tests
        run: |
          pytest test_app.py --junitxml=test-results.xml --cov=. --cov-report=xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

  build:
    name: Build Application
    needs: install-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Package application
        run: |
          mkdir -p dist
          tar --exclude='.git' --exclude='dist' --exclude='venv' -czf dist/flask-app-${{ github.sha }}.tar.gz .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flask-app-build
          path: dist/*.tar.gz

  deploy-staging:
    name: Deploy to Staging
    needs: build
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: flask-app-build
          path: dist

      - name: Deploy to staging server
        id: deploy
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          echo "Deploying package dist/*.tar.gz to staging host $STAGING_HOST"
          # Example using SSH (uncomment and adapt when a real staging host is available):
          # mkdir -p ~/.ssh && echo "$STAGING_SSH_KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
          # scp -o StrictHostKeyChecking=no dist/*.tar.gz $STAGING_USER@$STAGING_HOST:/opt/flask_app/
          # ssh -o StrictHostKeyChecking=no $STAGING_USER@$STAGING_HOST "cd /opt/flask_app && tar xzf *.tar.gz && \
          #   echo MONGO_URI=$MONGO_URI > .env && echo SECRET_KEY=$SECRET_KEY >> .env && \
          #   systemctl restart flask-app"
          echo "url=https://staging.example.com" >> "$GITHUB_OUTPUT"

  deploy-production:
    name: Deploy to Production
    needs: build
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: flask-app-build
          path: dist

      - name: Deploy to production server
        id: deploy
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_USER: ${{ secrets.PROD_USER }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          echo "Deploying release ${{ github.event.release.tag_name }} to production host $PROD_HOST"
          # Example using SSH (uncomment and adapt when a real production host is available):
          # mkdir -p ~/.ssh && echo "$PROD_SSH_KEY" > ~/.ssh/id_rsa && chmod 600 ~/.ssh/id_rsa
          # scp -o StrictHostKeyChecking=no dist/*.tar.gz $PROD_USER@$PROD_HOST:/opt/flask_app/
          # ssh -o StrictHostKeyChecking=no $PROD_USER@$PROD_HOST "cd /opt/flask_app && tar xzf *.tar.gz && \
          #   echo MONGO_URI=$MONGO_URI > .env && echo SECRET_KEY=$SECRET_KEY >> .env && \
          #   systemctl restart flask-app"
          echo "url=https://www.example.com" >> "$GITHUB_OUTPUT"
